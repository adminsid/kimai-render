services:
  - type: web
    name: kimai-tidb
    env: docker
    plan: free
    region: oregon # or your preferred region
    dockerContext: .
    dockerfilePath: Dockerfile
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: APP_SECRET
        generateValue: true
      - key: ADMINMAIL
        sync: false
      - key: ADMINPASS
        sync: false
      - key: ADMINUSER
        value: admin
        sync: false
      - key: APP_ENV
        value: prod
      - key: TRUSTED_PROXIES
        value: "10.0.0.0/8" # Render internal proxy range
      - key: MAILER_URL
        value: "null://localhost"
